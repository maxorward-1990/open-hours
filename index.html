<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Se öppettider i realtid för butiker i Solna, Sundbyberg, Bromma och Hornsberg.">
<meta property="og:title" content="Max Öppettider · Solna">
<meta property="og:description" content="Se öppettider i realtid för butiker i Solna, Sundbyberg, Bromma och Hornsberg.">
<meta property="og:type" content="website">
<title>Max Öppettider · Solna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --fu:'Rajdhani',sans-serif;
  --fm:'Share Tech Mono',monospace;
  --bg:#0a0a0a;--s1:#111111;
  --bd:rgba(255,255,255,.10);--bh:rgba(255,255,255,.25);
  --cy:#e0e0e0;--cn:#e0e0e0;--cr:#ff3c5a;--cg:#39ff6e;
  --tx:#c8c8c8;--mu:#555555;
  --gc:0 0 8px rgba(224,224,224,.7),0 0 20px rgba(224,224,224,.25);
  --gy:0 0 8px rgba(224,224,224,.4);
  --ez:150ms cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}
body{
  font-family:var(--fu);
  background:var(--bg);
  color:var(--tx);
  display:flex;
  flex-direction:column;
  height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);
}

/* HEADER */
header{
  flex-shrink:0;
  display:flex;align-items:center;gap:14px;
  padding:7px 18px;
  background:var(--s1);
  border-bottom:1px solid var(--bh);
  position:relative;z-index:500;
}
header::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cn) 30%,var(--cy) 70%,transparent);
  opacity:.55;
}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.logo svg{color:var(--cr);filter:drop-shadow(0 0 6px var(--cr));}
.lt{font-size:17px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cn);text-shadow:var(--gc);}
.ls{font-family:var(--fm);font-size:9px;color:var(--mu);letter-spacing:.1em;display:block;margin-top:-3px;}
.db{font-family:var(--fm);font-size:11px;color:#fff;border:1px solid var(--cr);padding:3px 11px;letter-spacing:.1em;text-transform:uppercase;text-shadow:none;}
.vbadge{font-family:var(--fm);font-size:10px;color:var(--cr);border:1px solid var(--cr);padding:2px 8px;letter-spacing:.1em;text-transform:uppercase;}
.hr{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sw{position:relative;}
.sw input{background:rgba(224,224,224,.05);border:1px solid var(--bh);color:var(--tx);font-family:var(--fm);font-size:12px;padding:6px 12px 6px 28px;outline:none;width:165px;transition:border-color var(--ez);}
.sw input::placeholder{color:var(--mu);}
.sw input:focus{border-color:var(--cn);}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--mu);pointer-events:none;}
.hbtn{background:transparent;border:1px solid var(--bh);color:var(--mu);font-family:var(--fm);font-size:11px;padding:5px 9px;cursor:pointer;transition:all var(--ez);letter-spacing:.06em;display:flex;align-items:center;gap:5px;}
.hbtn:hover{color:var(--cn);border-color:var(--cn);}
.hbtn.active{color:var(--cg);border-color:var(--cg);}

/* FILTER BAR */
.fb{
  flex-shrink:0;
  display:flex;align-items:center;gap:0;
  padding:5px 18px;
  background:var(--s1);
  border-bottom:1px solid var(--bd);
  overflow-x:auto;scrollbar-width:none;
}
.fb::-webkit-scrollbar{display:none;}
.fb-row1{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.fb-row2{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.fb-row1::after{content:'';display:block;width:1px;height:16px;background:var(--bh);margin:0 10px;flex-shrink:0;}
.fl{font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);flex-shrink:0;}
.fd{width:1px;height:14px;background:var(--bh);flex-shrink:0;margin:0 3px;}
.pill{
  font-family:var(--fu);font-weight:600;font-size:12px;letter-spacing:.07em;text-transform:uppercase;
  padding:3px 11px;background:transparent;border:1px solid var(--bh);color:var(--mu);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all var(--ez);
}
.pill:hover{color:#fff;border-color:rgba(255,255,255,.5);box-shadow:0 0 6px rgba(255,255,255,.2);}
.pill.active[data-status="all"]{color:#fff;border-color:var(--cn);box-shadow:0 0 8px rgba(224,224,224,.3);}.pill.active[data-status="open"]{color:#fff;border-color:var(--cg);box-shadow:0 0 8px rgba(57,255,110,.4);}.pill.active[data-status="soon"]{color:#fff;border-color:#f5d800;box-shadow:0 0 8px rgba(245,216,0,.4);}.pill.active[data-status="closed"]{color:#fff;border-color:var(--cr);box-shadow:0 0 8px rgba(255,60,90,.4);}
.pill.active[data-cat]{color:#fff;border-color:var(--cc,var(--cn));box-shadow:0 0 6px rgba(224,224,224,.25);}
.pill.active#transitToggleBtn{color:#fff;border-color:var(--cn);background:rgba(224,224,224,.08);box-shadow:0 0 8px rgba(224,224,224,.2);}

/* MAP WRAP — takes all remaining space */
#mapwrap{
  flex:1;
  position:relative;
  overflow:hidden;
  min-height:0;
}
#map{position:absolute;inset:0;}
.leaflet-container{background:#06090e !important;}
.leaflet-tile-pane{filter:hue-rotate(190deg) saturate(1.5) brightness(0.82);}
.leaflet-control-zoom a{background:var(--s1)!important;color:var(--cn)!important;border-color:var(--bh)!important;border-radius:0!important;}
.leaflet-control-attribution{background:rgba(6,9,14,.8)!important;color:var(--mu)!important;font-size:9px!important;}

/* CLUSTERS */
.marker-cluster{background:transparent!important;}
.marker-cluster div{background:transparent!important;border:none!important;box-shadow:none!important;text-shadow:none!important;border-radius:0!important;}
.marker-cluster-small div{width:40px!important;height:40px!important;}
.marker-cluster-medium div{width:48px!important;height:48px!important;}
.marker-cluster-large div{width:56px!important;height:56px!important;}


/* STORE MARKERS */
.mk{position:relative;display:inline-block;cursor:pointer;transition:width .35s ease,height .35s ease;pointer-events:none;}.mk .mk-dot{pointer-events:auto;cursor:pointer;}
.mk-dot{display:block;transition:transform .3s ease,width .4s ease,height .4s ease,r .4s ease;transform-origin:center;}
.mk:hover .mk-dot{transform:scale(1.6);filter:brightness(1.3);}
@keyframes ping{0%{transform:scale(1);opacity:.6;}100%{transform:scale(2.4);opacity:0;}}
.mk.open .mk-dot::before{content:"";position:absolute;inset:0;border-radius:50%;border:1px solid currentColor;animation:ping 2s ease-out infinite;}
@keyframes pulse-close{0%,100%{opacity:1;filter:drop-shadow(0 0 3px var(--pc,#ff3c5a)) drop-shadow(0 0 6px var(--pc,#ff3c5a));}50%{opacity:.4;filter:drop-shadow(0 0 8px var(--pc,#ff3c5a)) drop-shadow(0 0 16px var(--pc,#ff3c5a)) drop-shadow(0 0 24px var(--pc,#ff3c5a));}}
.mk.closing .mk-dot{animation:pulse-close 6s ease-in-out infinite;}
.mk-lbl{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) translateY(6px) scale(.97);opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s cubic-bezier(.2,.8,.3,1);display:flex;flex-direction:column;gap:2px;width:300px;background:rgba(12,12,12,.94);border:1px solid var(--lc,#e0e0e0);border-left:3px solid var(--lc,#e0e0e0);padding:4px 8px;pointer-events:auto;cursor:pointer;box-shadow:0 0 10px color-mix(in srgb,var(--lc,#e0e0e0) 30%,transparent);z-index:10;}
.mk.show-label .mk-lbl{opacity:1;transform:translateX(-50%) translateY(0) scale(1);pointer-events:auto;}
.mk-lbl-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mk-lbl .ln{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.04em;color:#e0f0fa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.sbadge{font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 6px;height:18px;line-height:18px;flex-shrink:0;white-space:nowrap;display:inline-flex;align-items:center;background:rgba(4,8,14,.75)!important;border:1px solid rgba(255,255,255,.08);opacity:.85;}
.sbadge.open   {color:rgba(57,255,110,.9)!important;}
.sbadge.soon   {color:rgba(255,210,0,.9)!important;}
.sbadge.closed {color:rgba(255,60,90,.85)!important;}
.sbadge.unknown{color:rgba(255,210,0,.7)!important;}
.sbadge.varies {color:rgba(255,210,0,.9)!important;}
.mk-lbl-hrs .lh{font-family:'Share Tech Mono',monospace;font-size:10px;color:#8aaabb;}

/* HOME MARKER */
.home-mk{width:32px;height:32px;display:flex;align-items:center;justify-content:center;animation:home-pulse 5s ease-in-out infinite;}
@keyframes home-pulse{0%,100%{filter:drop-shadow(0 0 2px rgba(255,60,90,.4));}50%{filter:drop-shadow(0 0 8px #ff3c5a) drop-shadow(0 0 18px #ff3c5a) drop-shadow(0 0 30px rgba(255,60,90,.5));}}
  50%{filter:drop-shadow(0 0 8px #b967ff) drop-shadow(0 0 18px #b967ff) drop-shadow(0 0 28px #b967ff77);}
}
.home-mk svg{animation:home-pulse 2.5s ease-in-out infinite;}

/* TRANSIT MARKERS */
.transit-mk{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;font-family:'Share Tech Mono',monospace;
  background:rgba(4,8,14,.92);
  border:1.5px solid var(--tc,#e0e0e0);
  clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
  box-shadow:0 0 12px color-mix(in srgb,var(--tc,#e0e0e0) 70%,transparent),inset 0 0 8px color-mix(in srgb,var(--tc,#e0e0e0) 15%,transparent);
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  color:var(--tc,#e0e0e0);text-shadow:0 0 8px var(--tc,#e0e0e0);
}
.transit-mk:hover{transform:scale(1.2);box-shadow:0 0 20px color-mix(in srgb,var(--tc,#e0e0e0) 90%,transparent);}

/* POPUP */
.cpop .leaflet-popup-content-wrapper{opacity:0;transition:none!important;}
.leaflet-popup-content-wrapper{width:300px!important;background:rgba(10,10,10,.97)!important;border:1px solid var(--pw-col,#e0e0e0)!important;border-left:3px solid var(--pw-col,#e0e0e0)!important;box-shadow:0 0 20px color-mix(in srgb,var(--pw-col,#e0e0e0) 30%,transparent)!important;border-radius:0!important;color:#b8d4e8!important;padding:0!important;}
.cpop .
@keyframes popup-expand{
  0%  {opacity:0;transform:translateY(12px) scaleY(0.7);transform-origin:bottom center;}
  70% {opacity:1;transform:translateY(-2px) scaleY(1.01);}
  100%{opacity:1;transform:translateY(0) scaleY(1);}
}
.cpop .leaflet-popup-tip-container{display:none;}
.mk.closing .mk-ping{transform-origin:50% 50%;animation:svgPing 5s ease-out infinite;}
@keyframes svgPing{0%{transform:scale(1);opacity:.5;}100%{transform:scale(2.4);opacity:0;}}
.leaflet-popup{animation:none!important;}.leaflet-popup-pane{transition:none!important;}.leaflet-fade-anim .leaflet-popup{transition:none!important;}.leaflet-zoom-anim .leaflet-popup{transition:none!important;}
@keyframes popupIn{from{opacity:0;transform:translateY(-4px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes popupOut{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(4px) scale(.97);}}
.leaflet-popup.closing{pointer-events:none;}
.cpop .leaflet-popup-content{margin:0!important;width:auto!important;}
.pi{padding:14px 18px;min-width:230px;max-width:300px;border-top:2px solid var(--pi-cat,#e0e0e0);box-shadow:0 -3px 14px color-mix(in srgb,var(--pi-cat,#e0e0e0) 35%,transparent);animation:popup-content .3s .05s cubic-bezier(.16,1,.3,1) both;}
.pn{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;}
.pc{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px;font-weight:700;}
.pdv{height:1px;margin-bottom:9px;}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.ps{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 10px;height:22px;line-height:22px;display:inline-flex;align-items:center;background:rgba(4,8,14,.75)!important;border:1px solid rgba(255,255,255,.1);opacity:.9;}
.ps.open   {color:rgba(57,255,110,.95)!important;}
.ps.soon   {color:rgba(255,210,0,.95)!important;}
.ps.closed {color:rgba(255,60,90,.85)!important;}
.ps.unknown{color:rgba(255,210,0,.7)!important;}
.ps.varies {color:rgba(255,210,0,.95)!important;}
.ph{font-family:'Share Tech Mono',monospace;font-size:13px;color:#b8d4e8;}
.pnxt{font-family:'Share Tech Mono',monospace;font-size:10px;color:#4a6a80;margin-bottom:4px;}
.pa{font-family:'Share Tech Mono',monospace;font-size:10px;color:#4a6a80;margin-top:6px;letter-spacing:.04em;}
.pweek{margin-top:10px;border-top:1px solid rgba(255,255,255,.08);padding-top:8px;display:grid;grid-template-columns:36px 1fr;gap:2px 8px;}
.pweek-note{font-family:'Share Tech Mono',monospace;font-size:10px;color:#b8d4e8;margin-top:10px;border-top:1px solid rgba(255,255,255,.08);padding-top:8px;line-height:1.6;}
.pday.today{color:#a8bac8!important;font-weight:700;}
.phrs.today{color:#e0e0e0!important;}
.pday{font-family:'Share Tech Mono',monospace;font-size:10px;color:#4a6a80;}
.phrs{font-family:'Share Tech Mono',monospace;font-size:10px;color:#b8d4e8;}
.today.pday,.today.phrs{font-weight:700;color:#fff;}
.pnav{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-family:'Share Tech Mono',monospace;font-size:10px;text-decoration:none;border:1px solid rgba(255,255,255,.2);padding:4px 10px;color:#fff;}
.pnav:hover{background:rgba(255,255,255,.07);}

/* TRANSIT PANEL */
#transitPanel{
  position:absolute;bottom:0;left:0;right:0;z-index:450;
  background:rgba(4,8,14,.97);
  border-top:1.5px solid var(--cn);
  display:none;flex-direction:column;
  height:70vh;max-height:70vh;
  box-shadow:0 -4px 30px rgba(224,224,224,.15);
}
#transitPanel.open{display:flex;}
.t-header{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.t-header-title{font-family:var(--fm);font-size:11px;color:var(--cn);letter-spacing:.12em;text-transform:uppercase;flex:1;}
.t-close{background:transparent;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.t-close:hover{color:var(--cr);}
#stopSel{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--bd);}
#stopSel::-webkit-scrollbar{display:none;}
.stop-btn{font-family:var(--fm);font-size:10px;color:var(--mu);background:transparent;border:1px solid var(--bd);padding:4px 12px;cursor:pointer;letter-spacing:.06em;white-space:nowrap;transition:all var(--ez);}
.stop-btn:hover{color:var(--cn);border-color:var(--cn);}
.stop-btn.active{color:var(--cn);border-color:var(--cn);background:rgba(224,224,224,.08);}
#transitContent{flex:1;overflow-y:auto;padding:10px 14px;min-height:0;}
.t-loading,.t-empty,.t-error{font-family:var(--fm);font-size:11px;color:var(--mu);padding:20px 0;text-align:center;}
.t-error{color:var(--cr);}
.t-stop-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--cn);letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:baseline;gap:8px;}
.t-desc{font-family:var(--fm);font-size:10px;color:var(--mu);font-weight:400;}
.t-rows{display:flex;flex-direction:column;gap:3px;}
.t-row{display:grid;grid-template-columns:48px 1fr 58px;align-items:center;gap:8px;padding:6px 8px;background:rgba(224,224,224,.04);border-left:2px solid var(--bd);}
.t-row.t-late{border-left-color:var(--cy);}
.t-line{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--cn);}
.t-dir{font-family:var(--fu);font-size:13px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-time{font-family:var(--fm);font-size:13px;color:var(--cy);text-align:right;font-weight:700;}
.t-row.t-late .t-time{color:var(--cr);}

/* FAB BUTTONS */
.fab-group{position:absolute;bottom:24px;left:14px;z-index:400;display:flex;flex-direction:column;gap:10px;}
@keyframes fabIn{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
.fab{width:48px;height:48px;background:rgba(4,8,14,.95);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;transition:filter .15s cubic-bezier(.16,1,.3,1);clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0% calc(100% - 10px),0% 10px);animation:fabIn .5s cubic-bezier(.2,.8,.3,1) both;}
.fab#transitBtn{box-shadow:0 0 0 1.5px #e0e0e0,0 0 16px rgba(224,224,224,.5),inset 0 0 10px rgba(224,224,224,.08);font-size:0;}
.fab#transitBtn{position:relative;}
.fab#transitBtn::before{content:'T';font-size:20px;font-weight:900;color:#e0e0e0;text-shadow:0 0 8px #e0e0e0,0 0 18px #e0e0e0aa,0 0 2px #fff;line-height:1;font-family:'Rajdhani',sans-serif;letter-spacing:-.02em;position:relative;z-index:1;}
.fab#transitBtn::after{content:'';position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:28px;height:2px;background:#e0e0e0;box-shadow:0 0 6px #e0e0e0,0 0 12px #e0e0e088;}
.fab#transitBtn:hover,.fab#transitBtn.transit-active{filter:brightness(1.4);box-shadow:0 0 0 1.5px #e0e0e0,0 0 28px rgba(224,224,224,.9),inset 0 0 16px rgba(224,224,224,.2);}
.fab#editBtn{box-shadow:0 0 0 1.5px #ff3c5a,0 0 16px rgba(255,60,90,.4),inset 0 0 10px rgba(255,60,90,.06);font-size:0;}
.fab#editBtn::before{content:'⊕';font-size:22px;color:#ff3c5a;text-shadow:0 0 8px #ff3c5a,0 0 16px #ff3c5a88;line-height:1;font-family:'Share Tech Mono',monospace;}
.fab#editBtn:hover,.fab#editBtn.edit-active{filter:brightness(1.4);box-shadow:0 0 0 1.5px #ff3c5a,0 0 28px rgba(255,60,90,.8),inset 0 0 16px rgba(185,103,255,.15);}

/* EDIT PANEL */
#editPanel{position:absolute;bottom:140px;right:14px;z-index:500;background:rgba(4,8,14,.97);border:1px solid var(--cy);padding:12px 14px;width:320px;max-height:45vh;display:none;flex-direction:column;gap:8px;box-shadow:0 0 20px rgba(185,103,255,.2);}
#editPanel.open{display:flex;}
#editPanel h3{font-family:var(--fm);font-size:11px;color:var(--cy);letter-spacing:.12em;text-transform:uppercase;}
#editPanel p{font-family:var(--fm);font-size:10px;color:var(--mu);line-height:1.5;}
#editPanel p strong{color:var(--tx);}
#coordLog{flex:1;overflow-y:auto;max-height:160px;background:#060b12;border:1px solid var(--bd);padding:8px;font-family:var(--fm);font-size:10px;color:var(--cg);white-space:pre;}
#copyBtn{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:1px solid var(--cy);color:var(--cy);padding:5px 10px;cursor:pointer;transition:all var(--ez);}
#copyBtn:hover{background:rgba(185,103,255,.08);}
#copyBtn.copied{color:var(--cg);border-color:var(--cg);}
.map-edit-mode .leaflet-container{cursor:crosshair!important;}

.pill[data-cat]::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--cc,#e0e0e0);margin-right:5px;vertical-align:middle;box-shadow:0 0 5px var(--cc,#e0e0e0);}
.t-refresh{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;font-family:var(--fm);font-size:10px;color:var(--mu);}
.t-refresh-time{color:var(--cy);}

function isoWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));
  const y = new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-y)/86400000)+1)/7);
}
function tm(t){const[h,m]=t.split(":").map(Number);return h*60+m;}

function gs(store){
  const now=new Date(),d=(window._forceDay!==undefined?window._forceDay:now.getDay()),nm=now.getHours()*60+now.getMinutes();
  if(!store.h) return {s:"unknown",l:"OKÄND",str:"–",nxt:null,closing:false};
  if(store.h==="varies") return {s:"varies",l:"VARIERAR",str:"Eventbaserat",nxt:null,closing:false};
  if(typeof store.h==="string"&&store.h.startsWith("biweekly-even-thu")){
    const parts=store.h.split("-"),open=parts[3],close=parts[4];
    const wk=isoWeek(now),isThu=d===4,isEven=wk%2===0;
    const oM=tm(open),cM=tm(close),str=open+"–"+close;
    if(isEven&&isThu){
      if(nm>=oM&&nm<cM) return {s:"open",l:"ÖPPET",str,nxt:null,closing:(cM-nm)<=15};
      if(nm<oM&&(oM-nm)<=30) return {s:"soon",l:"ÖPPNAR SNART",str,nxt:null,closing:false};
    }
    let nxt="";
    for(let i=1;i<=14;i++){
      const nd=new Date(now);nd.setDate(nd.getDate()+i);
      if(nd.getDay()===4&&isoWeek(nd)%2===0){nxt="v."+isoWeek(nd)+" Tor "+open;break;}
    }
    return {s:"closed",l:"STÄNGT",str,nxt,closing:false};
  }
  const h=store.h[d];
  if(!h){
    let nxt=null;
    for(let i=1;i<=7;i++){const nd=(d+i)%7;if(store.h[nd]){nxt=DSVs[nd]+" "+store.h[nd][0];break;}}
    return {s:"closed",l:"STÄNGT",str:"Stängt idag",nxt,closing:false};
  }
  const oM=tm(h[0]);let cM=tm(h[1]);if(cM<oM)cM+=1440;
  const str=h[0]+"–"+h[1];
  if(nm<oM) return (oM-nm<=60)?{s:"soon",l:"ÖPPNAR SNART",str,nxt:null,closing:false}:{s:"closed",l:"STÄNGT",str,nxt:"Idag "+h[0],closing:false};
  if(nm>=oM&&nm<cM){const left=cM-nm;return(left<=60)?{s:"soon",l:"STÄNGER SNART",str,nxt:null,closing:true}:{s:"open",l:"ÖPPET",str,nxt:null,closing:false};}
  let nxt=null;
  for(let i=1;i<=7;i++){const nd=(d+i)%7;if(store.h[nd]){nxt=DSVs[nd]+" "+store.h[nd][0];break;}}
  return {s:"closed",l:"STÄNGT",str,nxt,closing:false};
}

function weekHtml(store){
  if(!store.h||store.h==="varies") return "";
  if(typeof store.h==="string"&&store.h.startsWith("biweekly")){
    const parts=store.h.split("-"),open=parts[3],close=parts[4];
    return `<div class="pweek-note">Varannan vecka (jämna v.)<br>Torsdagar ${open}–${close}</div>`;
  }
  const d=new Date().getDay();let rows="";
  for(let i=0;i<7;i++){
    const h=store.h[i],cls=(i===d)?" today":"";
    rows+=`<div class="pday${cls}">${DSVs[i]}</div><div class="phrs${cls}">${h?h[0]+"–"+h[1]:"Stängt"}</div>`;
  }
  return `<div class="pweek">${rows}</div>`;
}

function dotSz(z){return z>=17?28:z>=16?24:z>=15?20:z>=14?17:z>=13?15:13;}

function mkIcon(s,inf,z){

    <div class="mk-lbl-top"><span class="ln">${s.n}</span><span class="sbadge ${bc}">${SL_LABELS[inf.s]||inf.s}</span></div>
    ${hrs?`<div class="mk-lbl-hrs">${hrs}</div>`:""}
  </div>`;
  return L.divIcon({
    html:`<div class="mk${inf.closing?" closing":""}${(inf.s==="open"||inf.s==="soon")?" mk-open":""}" style="--cat-col:${catCol};width:${sz}px;height:${sz}px;opacity:${(inf.s==="closed"||inf.s==="unknown")?0.28:1};transition:opacity .4s ease;">${lbl}<svg class="mk-dot" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="overflow:visible;display:block;">${inf.closing?`<circle class="mk-ping" cx="${sz/2}" cy="${sz/2}" r="${sz/2-1.5}" fill="none" stroke="${catCol}" stroke-width="1" opacity="0.5"/>`:"" }<circle cx="${sz/2}" cy="${sz/2}" r="${sz/2-1.5}" fill="none" stroke="${catCol}" stroke-width="1.5" style="filter:${inf.s==="open"?`drop-shadow(0 0 4px ${catCol}) drop-shadow(0 0 8px ${catCol})`:(inf.s==="soon"?`drop-shadow(0 0 3px ${catCol})`:"none")};"/></svg></div>`,
    className:"",iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
  });
}

async function isRedDay(date){
  const y=date.getFullYear(),mo=date.getMonth()+1,d=date.getDate();
  const k=`${y}-${mo}-${d}`;
  if(_hdc[k]!==undefined)return _hdc[k];
  try{
    const r=await fetch(`https://sholiday.faboul.se/dagar/v2.1/${y}/${mo}/${d}`);
    const j=await r.json();
    const v=!!(j.dagar&&j.dagar[0]&&j.dagar[0]['är helgdag']==='Ja');
    return(_hdc[k]=v);
  }catch(e){return(_hdc[k]=false);}
}

async function fetchWithProxy(url) {
  const proxies = [
    url,
    `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
  ];
  for(const p of proxies) {
    try {
      const res = await fetch(p, {signal: AbortSignal.timeout(8000)});
      if(!res.ok) continue;
      const raw = await res.json();
      return raw.contents ? JSON.parse(raw.contents) : raw;
    } catch(e) { continue; }
  }
  return null;
}

// Cache resolved site IDs
const resolvedSiteIds = {};

async function resolveSiteId(stop) {
  if(resolvedSiteIds[stop.id]) return resolvedSiteIds[stop.id];
  try {
    const data = await fetchWithProxy('https://transport.integration.sl.se/v1/sites?expand=false');
    let sites = Array.isArray(data) ? data : (data?.sites || data?.data || []);
    if(sites.length > 0) {
      const q = stop.name.toLowerCase().replace(/\s+/g,' ').trim();
      // Try exact match first, then partial
      let match = sites.find(s => s.name && s.name.toLowerCase() === q);
      if(!match) match = sites.find(s => s.name && s.name.toLowerCase().includes(q));
      if(!match) match = sites.find(s => s.name && q.includes(s.name.toLowerCase()));
      if(match) {
        resolvedSiteIds[stop.id] = String(match.id);
        console.log(`[Transit] Resolved "${stop.name}" → ID ${match.id} (${match.name})`);
        return resolvedSiteIds[stop.id];
      }
      console.warn(`[Transit] No site match for "${stop.name}", falling back to ${stop.slid}`);
    }
  } catch(e) { console.warn('[Transit] resolveSiteId error:', e); }
  resolvedSiteIds[stop.id] = stop.slid;
  return stop.slid;
}

async function loadDepartures(stop) {
  transitContent.innerHTML = '<div class="t-loading">Hämtar avgångar...</div>';
  try {
    const siteId = await resolveSiteId(stop);
    const depUrl = `https://transport.integration.sl.se/v1/sites/${siteId}/departures?forecast=60`;
    const data = await fetchWithProxy(depUrl);
    if(!data) throw new Error("Ingen data");
    let deps = data.departures || [];
    if(stop.filter) deps = deps.filter(d => d.line && d.line.transport_mode === stop.filter);
    if(stop.lines)  deps = deps.filter(d => d.line && stop.lines.includes(d.line.designation));
    if(deps.length === 0) {
      // Try without line filter to debug
      const all = data.departures || [];
      const modes = [...new Set(all.map(d => d.line?.transport_mode))].join(", ");
      const lines = [...new Set(all.map(d => d.line?.designation))].slice(0,8).join(", ");
      transitContent.innerHTML = `<div class="t-empty">Inga avgångar för ${stop.filter} / ${(stop.lines||[]).join(",")}.<br><small>Site ID: ${siteId} | Lägen: ${modes||"–"} | Linjer: ${lines||"–"}</small></div>`;
      return;
    }
    deps.sort((a,b) => new Date(a.expected||a.scheduled) - new Date(b.expected||b.scheduled));
    deps = deps.slice(0, 25);
    const now = new Date();
    let html = `<div class="t-stop-title">${transitModeIcon(stop.filter)} ${stop.name}<span class="t-desc">${stop.desc}</span></div><div class="t-rows">`;
    for(const d of deps) {
      const exp = new Date(d.expected||d.scheduled);
      const minDiff = Math.round((exp - now)/60000);
      const timeStr = minDiff <= 0 ? "Nu" : minDiff < 60 ? minDiff+" min" : exp.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
      const late = (d.expected && d.scheduled && new Date(d.expected) > new Date(d.scheduled)) ? " t-late" : "";
      html += `<div class="t-row${late}">
        <span class="t-line">${d.line?.designation||""}</span>
        <span class="t-dir">${d.direction||""}</span>
        <span class="t-time">${timeStr}</span>
      </div>`;
    }
    html += '</div>';
    transitContent.innerHTML = html;
    document.getElementById('transitUpdated').textContent = new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch(e) {
    transitContent.innerHTML = `<div class="t-error">⚠ Fel: ${e.message}</div>`;
  }
}

function updateGsNotis(){
  const now=new Date(),d=(window._forceDay!==undefined?window._forceDay:now.getDay()),nm=now.getHours()*60+now.getMinutes();
  function isoWk(dt){const d2=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));d2.setUTCDate(d2.getUTCDate()+4-(d2.getUTCDay()||7));const y=new Date(Date.UTC(d2.getUTCFullYear(),0,1));return Math.ceil((((d2-y)/86400000)+1)/7);}
  const el=document.getElementById('gsNotis');
  for(let i=0;i<=7;i++){
    const nd=new Date(now);nd.setDate(nd.getDate()+i);
    if(nd.getDay()===4&&isoWk(nd)%2===0){
      const target=new Date(nd);target.setHours(17,40,0,0);
      const diffMs=target-now;
      if(diffMs<0) continue;
      const diffH=diffMs/3600000;
      if(diffH<=48){
        const hh=Math.floor(diffH),mm=Math.floor((diffH-hh)*60);
        el.textContent='Grovsop om '+(hh>0?hh+'h ':'')+mm+'m';
        el.style.display='';return;
      }
      break;
    }
  }
  el.style.display='none';
}
updateGsNotis();setInterval(updateGsNotis,60000);
